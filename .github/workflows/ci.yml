name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq git patch sed binutils squashfs-tools rename findutils xz-utils make

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Check Makefile
        run: make help

      - name: Check required directories
        run: |
          test -d assets
          test -d cobalt-bin
          test -d cobalt-patches
          test -d webapp

      - name: Build injected web app
        working-directory: webapp
        run: |
          npm ci
          npm run build -- --env production --optimization-minimize
